name: Run Robots.txt Monitor

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for running the monitor'
        required: false
        default: 'Manual trigger from dashboard'

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run monitor script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python monitor.py
      
      - name: Monitor completed
        run: echo "Monitor check completed successfully"
