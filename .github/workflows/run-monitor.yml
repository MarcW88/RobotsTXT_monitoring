name: Run Robots.txt Monitor

on:
  workflow_dispatch:
    inputs:
      check_run_id:
        description: 'Check run ID from Supabase'
        required: false
      reason:
        description: 'Reason for running the monitor'
        required: false
        default: 'Manual trigger from dashboard'

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install supabase
      
      - name: Update status to running
        if: inputs.check_run_id != ''
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          CHECK_RUN_ID: ${{ inputs.check_run_id }}
        run: |
          python -c "
          from supabase import create_client
          import os
          supabase = create_client(os.environ['SUPABASE_URL'], os.environ['SUPABASE_KEY'])
          supabase.table('check_runs').update({'status': 'running', 'started_at': 'now()'}).eq('id', os.environ['CHECK_RUN_ID']).execute()
          "
      
      - name: Run monitor script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python monitor.py
      
      - name: Update status to completed
        if: inputs.check_run_id != ''
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          CHECK_RUN_ID: ${{ inputs.check_run_id }}
        run: |
          python -c "
          from supabase import create_client
          import os
          supabase = create_client(os.environ['SUPABASE_URL'], os.environ['SUPABASE_KEY'])
          supabase.table('check_runs').update({'status': 'completed', 'completed_at': 'now()'}).eq('id', os.environ['CHECK_RUN_ID']).execute()
          "
      
      - name: Update status to failed on error
        if: failure() && inputs.check_run_id != ''
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          CHECK_RUN_ID: ${{ inputs.check_run_id }}
        run: |
          python -c "
          from supabase import create_client
          import os
          supabase = create_client(os.environ['SUPABASE_URL'], os.environ['SUPABASE_KEY'])
          supabase.table('check_runs').update({'status': 'failed', 'error_message': 'Monitor script failed', 'completed_at': 'now()'}).eq('id', os.environ['CHECK_RUN_ID']).execute()
          "
