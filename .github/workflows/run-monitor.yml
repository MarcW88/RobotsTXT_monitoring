name: Run Robots.txt Monitor

on:
  workflow_dispatch:
    inputs:
      check_run_id:
        description: 'Check run ID from Supabase'
        required: false
      reason:
        description: 'Reason for running the monitor'
        required: false
        default: 'Manual trigger from dashboard'

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "Dependencies installed successfully"
      
      - name: Run monitor script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          echo "=== Starting monitor script ==="
          echo "SUPABASE_URL is set: $([ -n "$SUPABASE_URL" ] && echo "YES" || echo "NO")"
          echo "SUPABASE_KEY is set: $([ -n "$SUPABASE_KEY" ] && echo "YES" || echo "NO")"
          echo "Running python monitor.py..."
          python monitor.py
          echo "=== Monitor script completed ==="
